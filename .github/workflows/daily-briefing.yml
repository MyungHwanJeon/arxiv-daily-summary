name: Daily arXiv Briefing

on:
  schedule:
    # UTC 02:00 = KST 11:00. arxiv listing usually settles by ~UTC 01:30.
    # Sunday is skipped inside the prompt per instruction_v20260425.md.
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: daily-briefing
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Claude Code briefing
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --model claude-opus-4-7
            --max-turns 60
            --allowedTools Bash,Read,Write,Edit,WebFetch,TodoWrite
          prompt: |
            당신은 매일 자동 실행되는 arXiv 브리핑 에이전트입니다.

            cloned된 repo 루트에서 작업하며, 다음 절차를 따릅니다:

            1. 먼저 prompts/instruction_v20260425.md 파일을 읽어 전체 작업 절차를 파악합니다.
            2. 그 instruction을 충실히 따라 오늘자 브리핑을 생성합니다.
            3. 작업 완료 후 git add → commit → push로 main 브랜치에 푸시합니다.

            ## 환경변수 사용 안내
            instruction에 등장하는 placeholder는 다음 환경변수에서 값을 읽어 사용:
            - {SLACK_CHANNEL_ID} → 환경변수 SLACK_CHANNEL_ID
            - {SLACK_CHANNEL} → 환경변수 SLACK_CHANNEL
            - Slack API 인증 토큰 → 환경변수 SLACK_BOT_TOKEN
            - {WORKDIR} → 현재 작업 디렉터리

            Slack 메시지는 https://slack.com/api/chat.postMessage 엔드포인트로 발송하세요.
            TTS는 OPENAI_API_KEY가 있으면 OpenAI tts-1로, 없거나 실패하면 mp3 생성 자체를 생략하세요.

            git 사용자 정보가 필요하면:
              git config user.name  "arxiv-briefing-bot"
              git config user.email "arxiv-briefing-bot@users.noreply.github.com"

            push 시 origin은 이미 GITHUB_TOKEN 으로 인증되어 있습니다.
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
